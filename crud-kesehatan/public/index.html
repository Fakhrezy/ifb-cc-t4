<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>CRUD Data Pasien</title>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				font-family: "Segoe UI", sans-serif;
				background: #f0f4f8;
				color: #333;
			}
			header {
				background: #2c7be5;
				color: white;
				padding: 20px 40px;
			}
			header h1 {
				font-size: 1.6rem;
			}
			header p {
				font-size: 0.9rem;
				opacity: 0.85;
			}
			.container {
				max-width: 900px;
				margin: 30px auto;
				padding: 0 20px;
			}
			.card {
				background: white;
				border-radius: 10px;
				padding: 25px;
				margin-bottom: 25px;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
			}
			h2 {
				font-size: 1.1rem;
				margin-bottom: 15px;
				color: #2c7be5;
				border-bottom: 2px solid #e8f0fb;
				padding-bottom: 8px;
			}
			.form-grid {
				display: grid;
				grid-template-columns: 1fr 1fr 1fr;
				gap: 12px;
			}
			label {
				display: block;
				font-size: 0.82rem;
				color: #666;
				margin-bottom: 4px;
			}
			input {
				width: 100%;
				padding: 9px 12px;
				border: 1px solid #dce3ec;
				border-radius: 6px;
				font-size: 0.95rem;
			}
			input:focus {
				outline: none;
				border-color: #2c7be5;
			}
			.btn-row {
				margin-top: 15px;
				display: flex;
				gap: 10px;
			}
			button {
				padding: 9px 20px;
				border: none;
				border-radius: 6px;
				cursor: pointer;
				font-size: 0.9rem;
				font-weight: 600;
			}
			.btn-primary {
				background: #2c7be5;
				color: white;
			}
			.btn-secondary {
				background: #e8f0fb;
				color: #2c7be5;
			}
			.btn-primary:hover {
				background: #1a68d1;
			}
			table {
				width: 100%;
				border-collapse: collapse;
				font-size: 0.92rem;
			}
			th {
				background: #f0f4f8;
				padding: 10px 14px;
				text-align: left;
				font-weight: 600;
				color: #555;
			}
			td {
				padding: 10px 14px;
				border-bottom: 1px solid #f0f0f0;
			}
			tr:hover td {
				background: #fafcff;
			}
			.btn-edit {
				background: #fff3cd;
				color: #856404;
				padding: 5px 12px;
				border-radius: 5px;
				font-size: 0.82rem;
			}
			.btn-delete {
				background: #fde8e8;
				color: #c53030;
				padding: 5px 12px;
				border-radius: 5px;
				font-size: 0.82rem;
			}
			.empty {
				text-align: center;
				color: #aaa;
				padding: 30px;
			}
			#alert {
				padding: 10px 16px;
				border-radius: 6px;
				margin-bottom: 12px;
				display: none;
				font-size: 0.9rem;
			}
			.alert-success {
				background: #d4edda;
				color: #155724;
				display: block !important;
			}
			.alert-error {
				background: #f8d7da;
				color: #721c24;
				display: block !important;
			}
			.icon {
				width: 1.2em;
				height: 1.2em;
				display: inline-block;
				margin-right: 5px;
				vertical-align: middle;
			}
			.icon-btn {
				width: 1em;
				height: 1em;
				display: inline-block;
				margin-right: 4px;
				vertical-align: middle;
			}
		</style>
	</head>
	<body>
		<header>
			<h1>
				<svg
					class="icon"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2">
					<path
						d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2m-2 15h4v-4h3l-4-5-4 5h3v4" />
				</svg>
				Sistem Data Pasien
			</h1>
			<p>Manajemen data pasien sederhana</p>
		</header>

		<div class="container">
			<div class="card">
				<h2 id="form-title">
					<svg
						class="icon"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2">
						<line x1="12" y1="5" x2="12" y2="19" />
						<line x1="5" y1="12" x2="19" y2="12" />
					</svg>
					Tambah Pasien Baru
				</h2>
				<div id="alert"></div>
				<div class="form-grid">
					<div>
						<label>Nama Pasien</label>
						<input type="text" id="nama" placeholder="Contoh: Deden Fahrul" />
					</div>
					<div>
						<label>Umur</label>
						<input type="number" id="umur" placeholder="Contoh: 20" />
					</div>
					<div>
						<label>Diagnosa</label>
						<input type="text" id="diagnosa" placeholder="Contoh: Hipertensi" />
					</div>
				</div>
				<div class="btn-row">
					<button class="btn-primary" onclick="simpanPasien()">
						<svg
							class="icon-btn"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2">
							<path
								d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
							<polyline points="17 21 17 13 7 13 7 21" />
							<polyline points="7 3 7 8 15 8" />
						</svg>
						Simpan
					</button>
					<button class="btn-secondary" onclick="resetForm()">
						<svg
							class="icon-btn"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2">
							<line x1="18" y1="6" x2="6" y2="18" />
							<line x1="6" y1="6" x2="18" y2="18" />
						</svg>
						Batal
					</button>
				</div>
				<input type="hidden" id="editId" />
			</div>

			<div class="card">
				<h2>
					<svg
						class="icon"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2">
						<path d="M9 11l3 3L22 4" />
						<path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
					</svg>
					Daftar Pasien
				</h2>
				<table>
					<thead>
						<tr>
							<th>#</th>
							<th>Nama</th>
							<th>Umur</th>
							<th>Diagnosa</th>
							<th>Aksi</th>
						</tr>
					</thead>
					<tbody id="tabel-pasien">
						<tr>
							<td colspan="5" class="empty">Belum ada data pasien</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<script>
			async function loadPasien() {
				const res = await fetch("/api/pasien");
				const data = await res.json();
				const tbody = document.getElementById("tabel-pasien");
				if (data.length === 0) {
					tbody.innerHTML =
						'<tr><td colspan="5" class="empty">Belum ada data pasien</td></tr>';
					return;
				}
				tbody.innerHTML = data
					.map(
						(p, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${p.nama}</td>
          <td>${p.umur} tahun</td>
          <td>${p.diagnosa}</td>
          <td>
            <button class="btn-edit" onclick="editPasien(${p.id}, '${p.nama}', ${p.umur}, '${p.diagnosa}')">
              <svg class="icon-btn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Edit
            </button>
            <button class="btn-delete" onclick="hapusPasien(${p.id})">
              <svg class="icon-btn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
              Hapus
            </button>
          </td>
        </tr>
      `
					)
					.join("");
			}

			async function simpanPasien() {
				const nama = document.getElementById("nama").value.trim();
				const umur = document.getElementById("umur").value.trim();
				const diagnosa = document.getElementById("diagnosa").value.trim();
				const editId = document.getElementById("editId").value;

				if (!nama || !umur || !diagnosa) {
					showAlert("Semua field wajib diisi!", "error");
					return;
				}

				const method = editId ? "PUT" : "POST";
				const url = editId ? `/api/pasien/${editId}` : "/api/pasien";

				await fetch(url, {
					method,
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ nama, umur: parseInt(umur), diagnosa })
				});

				showAlert(
					editId ? "Data berhasil diupdate!" : "Pasien berhasil ditambahkan!",
					"success"
				);
				resetForm();
				loadPasien();
			}

			function editPasien(id, nama, umur, diagnosa) {
				document.getElementById("nama").value = nama;
				document.getElementById("umur").value = umur;
				document.getElementById("diagnosa").value = diagnosa;
				document.getElementById("editId").value = id;
				document.getElementById("form-title").innerHTML =
					'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit Data Pasien';
				window.scrollTo(0, 0);
			}

			async function hapusPasien(id) {
				if (!confirm("Yakin ingin menghapus data ini?")) return;
				await fetch(`/api/pasien/${id}`, { method: "DELETE" });
				showAlert("Data berhasil dihapus!", "success");
				loadPasien();
			}

			function resetForm() {
				["nama", "umur", "diagnosa", "editId"].forEach(
					(id) => (document.getElementById(id).value = "")
				);
				document.getElementById("form-title").innerHTML =
					'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Tambah Pasien Baru';
			}

			function showAlert(msg, type) {
				const el = document.getElementById("alert");
				el.textContent = msg;
				el.className = `alert-${type}`;
				setTimeout(() => (el.style.display = "none"), 3000);
			}

			loadPasien();
		</script>
	</body>
</html>
